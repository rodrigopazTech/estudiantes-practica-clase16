<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-icon {
            font-size: 3rem;
            color: #0d6efd;
        }

        #spinner {
            display: none;
        }

        .error-msg {
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <i class="bi bi-shield-lock login-icon"></i>
        <h3 class="mt-3 mb-1">Iniciar Sesión</h3>
        <p class="text-muted mb-4">Sistema de Gestión de Estudiantes</p>

        <!-- Mensaje de error (oculto por defecto) -->
        <div id="error_msg" class="alert alert-danger error-msg">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="error_text"></span>
        </div>

        <form id="form_login">
            <div class="mb-3 text-start">
                <label for="usuario" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ej: profesor" required>
            </div>

            <div class="mb-3 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <span id="btn_text">Ingresar</span>
                <div id="spinner" class="spinner-border spinner-border-sm" role="status"></div>
            </button>
        </form>

        <div class="mt-3">
            <small class="text-muted">
                Usuarios de prueba: <code>profesor / clase14</code> ó <code>alumno / fullstack</code>
            </small>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
